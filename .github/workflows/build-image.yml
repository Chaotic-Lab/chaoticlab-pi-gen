name: Build Pi OS Image

on:
  schedule:
    - cron: '0 6 * * *'      # 03:00 BRT (UTC-3) nightly
  workflow_dispatch:           # manual trigger from Actions UI
  push:
    tags: ['v*.*.*']           # release builds on tag push

permissions:
  contents: read
  id-token: write              # required for cosign keyless OIDC

jobs:
  build:
    # Native arm64 runner (free for PUBLIC repos). pi-gen's arch-test sees arm64
    # as NATIVE so NO qemu/binfmt emulation is needed (the x86+emulation path
    # failed pi-gen's in-container arch-test). The proprietary lib stays private
    # in chaoticlab-sbc (cloned at build time via the SBC_READ_TOKEN secret);
    # this baker repo holds only image-assembly scripts.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.PI_DEFAULT_PASSWORD }}" ] && missing+=(PI_DEFAULT_PASSWORD)
          [ -z "${{ secrets.OPS_SSH_PUBKEY }}" ]     && missing+=(OPS_SSH_PUBKEY)
          [ -z "${{ secrets.MINIO_ACCESS_KEY }}" ]   && missing+=(MINIO_ACCESS_KEY)
          [ -z "${{ secrets.MINIO_SECRET_KEY }}" ]   && missing+=(MINIO_SECRET_KEY)
          [ -z "${{ secrets.SBC_READ_TOKEN }}" ]     && missing+=(SBC_READ_TOKEN)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Set up Python (wheel build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build tdc-pulse wheel from PRIVATE chaoticlab-sbc
        # Clone the private lib here (CI has a read-only deploy token) and build
        # the wheel into the stage's files/ dir. pi-gen then bakes the local
        # wheel into the image — the chroot NEVER clones the private repo, so
        # chaoticlab-sbc stays private. Runtime deps still resolve from public PyPI.
        run: |
          python -m pip install --upgrade build
          git clone --depth 1 --branch master \
            "https://x-access-token:${{ secrets.SBC_READ_TOKEN }}@github.com/Chaotic-Lab/chaoticlab-sbc.git" /tmp/sbc
          mkdir -p stage-tdc/01-install-pulse/files
          python -m build --wheel --outdir stage-tdc/01-install-pulse/files /tmp/sbc
          echo "Built wheel: $(ls stage-tdc/01-install-pulse/files/*.whl)"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          df -h

      - name: Build Raspberry Pi OS image
        id: pi-gen
        uses: usimd/pi-gen-action@v1
        with:
          # Pin to the 2025-10-01 bookworm-arm64 RELEASE tag. Two reasons:
          #  1) QA'd Raspberry Pi OS build (known-good stage0) → dodges the
          #     Aug-2025 archive-keyring regression on the arm64 DEV branch
          #     (pi-gen #862/#863) that broke deb.debian.org GPG verify in stage0
          #     (NO_PUBKEY). bookworm signing keys are stable/non-expiring.
          #  2) POST-dates fix commit e9c2afbd (2025-05-13) which wraps the
          #     export-image bmap copy in `if [ -f "$BMAP_FILE" ]`. The earlier
          #     2025-05-13 tag predated that commit and carried pi-gen #855:
          #     bmap CREATION is guarded by `if hash bmaptool` but the copy was
          #     UNCONDITIONAL. pi-gen runs in a Docker container (pigen_work)
          #     whose image only has pi-gen's `depends`, and bmap-tools is NOT in
          #     depends → bmaptool absent → no .bmap written → the bare cp aborted
          #     the build under set -e. Host-side extra-host-dependencies can't
          #     fix it (it installs on the runner, not inside pigen_work). This
          #     tag's guarded cp simply skips the missing .bmap and completes.
          #     No .bmap artifact is produced (fine — flash the .img.xz directly).
          pi-gen-version: '2025-10-01-raspios-bookworm-arm64'
          image-name: vena-pulse-${{ github.sha }}
          stage-list: stage0 stage1 stage2 ./stage-tdc
          release: bookworm
          compression: xz
          compression-level: 9
          username: vena
          password: ${{ secrets.PI_DEFAULT_PASSWORD }}
          enable-ssh: 1
          pubkey-only-ssh: 1
          pubkey-ssh-first-user: ${{ secrets.OPS_SSH_PUBKEY }}
          locale: pt_BR.UTF-8
          timezone: America/Sao_Paulo
          keyboard-keymap: br
          hostname: vena-pulse
          verbose-output: true

      - name: Compute SHA-256 manifest (OTA verification path)
        id: sha
        run: |
          IMG="${{ steps.pi-gen.outputs.image-path }}"
          sha256sum "$IMG" | awk '{print $1}' > "$IMG.sha256"
          echo "Image SHA-256: $(cat $IMG.sha256)"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign image (keyless OIDC via GitHub Actions)
        run: |
          cosign sign-blob --yes \
            --oidc-provider github-actions \
            --bundle "${{ steps.pi-gen.outputs.image-path }}.sigstore.json" \
            "${{ steps.pi-gen.outputs.image-path }}"

      - name: Verify own signature (self-test before publish)
        run: |
          cosign verify-blob \
            --bundle "${{ steps.pi-gen.outputs.image-path }}.sigstore.json" \
            --certificate-identity-regexp 'https://github.com/Chaotic-Lab/chaoticlab-pi-gen/.+' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "${{ steps.pi-gen.outputs.image-path }}"

      - name: Upload to MinIO (s3.chaoticlab.cloud)
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AWS_ENDPOINT_URL:      https://s3.chaoticlab.cloud
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          aws configure set default.s3.signature_version s3v4
          IMG="${{ steps.pi-gen.outputs.image-path }}"
          SIG="${IMG}.sigstore.json"
          SHA="${IMG}.sha256"
          CHANNEL="${{ github.ref_type == 'tag' && 'stable' || 'nightly' }}"
          BASE=$(basename "$IMG")
          # Versioned upload
          aws s3 cp "$IMG" "s3://datapool-tdc/firmware/pulse/$CHANNEL/$BASE"
          aws s3 cp "$SIG" "s3://datapool-tdc/firmware/pulse/$CHANNEL/$BASE.sigstore.json"
          aws s3 cp "$SHA" "s3://datapool-tdc/firmware/pulse/$CHANNEL/$BASE.sha256"
          # Update "latest" pointers for OTA polling (Sub-plan E consumes these)
          aws s3 cp "$IMG" "s3://datapool-tdc/firmware/pulse/$CHANNEL/latest.img.xz"
          aws s3 cp "$SIG" "s3://datapool-tdc/firmware/pulse/$CHANNEL/latest.img.xz.sigstore.json"
          aws s3 cp "$SHA" "s3://datapool-tdc/firmware/pulse/$CHANNEL/latest.img.xz.sha256"
          echo "Published $CHANNEL/$BASE (image + sigstore + sha256)"

      - name: Upload artifact (fallback for manual debug)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: pi-image-${{ github.sha }}
          path: ${{ steps.pi-gen.outputs.image-path }}
          retention-days: 7
